name: Automated Car Data Ingestion & AI Retraining Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System and Machine Learning Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "scikit-learn>=1.3.0" xgboost lightgbm catboost pandas numpy pymongo matplotlib seaborn
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Bronze Incremental Scraper
      run: |
        python src/scraper/scraper_historical.py 1 3

    - name: Execute Silver Data Transformation
      run: |
        python src/processing/process_silver.py

    - name: Bulk Upsert Bronze & Silver Data to MongoDB Atlas Cloud
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python src/processing/push_to_mongodb.py

    - name: Isolate Gold Layer and Grouped IQR Filter
      run: |
        python src/processing/process_gold.py

    - name: Execute Fast Sweet Deals Inference Engine & Sync Gold/Dictionary
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python src/models/extract_deals.py

    - name: Commit and Push Daily Gold Deals back to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/gold/gold_deals.csv || true
        git commit -m "DataOps Bot: Automatically updated daily commercial gold deals [skip ci]" -a || echo "Không có kèo thơm mới hôm nay."
        git push origin main || echo "Bỏ qua bước push."