name: Automated Car Data Ingestion Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Run workflow

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Incremental Scraper quét 3 trang đầu
    - name: Execute Bronze Incremental Scraper
      run: |
        python src/scraper/scraper_historical.py 1 3

    - name: Execute Silver Data Transformation
      run: |
        python src/processing/process_silver.py

    - name: Bulk Upsert Clean Data to MongoDB Atlas Cloud
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python src/processing/push_to_mongodb.py